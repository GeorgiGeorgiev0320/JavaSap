<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        h4 {
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Contact Information</h1>
    <div>
        <h4>Email: <a href="mailto:everythingshop@gmail.com">everythingshop@gmail.com</a></h4>
        <h4>Phone: <a href="tel:+123456789">123456789</a></h4>
    </div>
</div>
</body>
</html>
